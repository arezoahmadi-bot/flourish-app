<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#5a9e5f"/>
  
  <!-- Stem -->
  <path d="M256 380 Q256 280 256 200" stroke="#ffffff" stroke-width="18" stroke-linecap="round" fill="none"/>
  
  <!-- Main leaf left -->
  <path d="M256 260 Q200 220 180 160 Q230 170 256 220" fill="#ffffff" opacity="0.9"/>
  
  <!-- Main leaf right -->
